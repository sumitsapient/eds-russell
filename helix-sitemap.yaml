sitemaps:
  # Default sitemap -- all pages indexed in query-index.json
  default:
    source: /query-index.json
    destination: /sitemap.xml
    lastmod: YYYY-MM-DD
    # Exclude fragment pages (nav, footer, drafts) and noindex pages
    exclude:
      - /nav
      - /footer
      - /header
      - /drafts/**
